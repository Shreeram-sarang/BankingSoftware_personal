spring.application.name=BankingSoftware
spring.datasource.url=jdbc:mysql://localhost:3306/Banking_software
spring.datasource.username=root
spring.datasource.password=root123

# Transfer limits (INR)
banking.limits.intra.per-transaction=1000000
banking.limits.intra.daily=2000000
banking.limits.inter.neft.per-transaction=1000000
banking.limits.inter.neft.daily=2500000
banking.limits.inter.rtgs.per-transaction-min=200000
banking.limits.inter.rtgs.per-transaction-max=50000000
banking.limits.inter.imps.per-transaction=500000
banking.limits.inter.imps.daily=500000
banking.limits.inter.upi.per-transaction=100000
banking.limits.inter.upi.daily=100000

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
